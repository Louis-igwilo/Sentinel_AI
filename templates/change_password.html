<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>Sentinel AI | Reset Password</title>
  <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}">
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(220,53,69,0.14), transparent 30%), #0d1117;
      color: var(--text);
      font-family: var(--sans);
    }
    .reset-panel {
      width: min(420px, calc(100% - 32px));
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      box-shadow: var(--shadow);
    }
    .reset-panel h1 { margin: 0 0 6px; font-family: var(--mono); font-size: 1.4rem; }
    .reset-panel p { margin: 0 0 20px; color: var(--muted); line-height: 1.6; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
    .form-input { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; background: var(--surface2); color: var(--text); font-size: 0.95rem; }
    .form-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(220,53,69,0.12); }
    .btn-primary { width: 100%; margin-top: 12px; }
    .error-box { margin-bottom: 20px; padding: 12px 14px; background: rgba(220,53,69,0.12); border: 1px solid rgba(220,53,69,0.4); border-radius: 10px; color: #ff8c97; }
    .requirements { margin-top: 18px; color: var(--muted); font-size: 0.82rem; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="reset-panel">
    <h1>Password Reset</h1>
    <p>Complete your first login by choosing a secure password.</p>
    {% if error %}
    <div class="error-box">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input type="password" name="new_password" class="form-input" placeholder="Minimum 8 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="Repeat new password" required>
      </div>
      <button type="submit" class="btn-primary">Update Password</button>
    </form>
    <div class="requirements">
      <p>Passwords must be at least 8 characters and match exactly.</p>
    </div>
  </div>
</body>
</html>
